<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DarkDM</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="darkdm-popup">
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>DarkDM</span>
      </div>
      <span class="status" id="connectionStatus">● Desconectado</span>
    </header>

    <div class="section">
      <button id="scanVideos" class="btn btn-primary">
        🔍 Detectar videos en esta página
      </button>
      <button id="toggleDebugger" class="btn btn-secondary">
        🕸️ Modo depuración (Interceptor)
      </button>
    </div>

    <div class="section streams-section">
      <h3>Streams detectados</h3>
      <div id="streamsList" class="streams-list">
        <span class="empty">Ningún stream detectado aún</span>
      </div>
    </div>

    <div class="section">
      <h3>App de escritorio</h3>
      <div class="desktop-status">
        <span id="nativeStatus" class="badge badge-off">● App no conectada</span>
        <button id="openApp" class="btn btn-small" disabled>Abrir DarkDM</button>
      </div>
    </div>

    <footer>
      <a href="#" id="openSettings">⚙️ Ajustes</a>
      <span class="version">v1.0.0</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
